<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
</head>

<body>

    <table border="5">
         <!-- estrutura da tabela -->
        <thead>
            <tr> <!-- tag de linha -->
                <th>Nome</th> <!-- definir valor do cabeçalho -->
                <th>Idade</th>
                <th>Cidade</th>
            </tr>
        </thead> <!-- cabeçalho da tabela -->

        <tbody>
            <tr>
                <td>guilherme</td>
                <td>17</td>
                <td>SP</td>
            <tr>
                <td>matildes</td>
                <td>69</td>
                <td>piraporinha</td>
            </tr>

            <tr>
                <td>crhistian</td>
                <td>19</td>
                <td>cdd</td>
            </tr>

        </tbody> <!--corpo da tabela -->

    </table>

</body>

</html>
